# Server Port (Railway injects PORT at runtime)
server.port=${PORT:8080}

# Database Configuration (MySQL Database)
spring.datasource.url=jdbc:mysql://localhost:3306/newsdb

spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:w@mi$ho@1995#}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# Google Sign-In (mobile app sends ID tokens; comma-separated OAuth client IDs to accept)
app.google.client-ids=${GOOGLE_CLIENT_IDS:387899639418-a9jsdmuis71ciqvu7buaf0iktq2g6usu.apps.googleusercontent.com,387899639418-pq85d7b10bq8iik8v0u1lu9bis2g4rs0.apps.googleusercontent.com}

# JWT Configurations (Secret must be at least 256 bits / 32 bytes)
app.jwt.secret=${JWT_SECRET:4567890123456789012345678901234567890123456789012345678901234567}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Guardian API Configuration
guardian.api.key=${GUARDIAN_API_KEY:test}
guardian.api.base-url=https://content.guardianapis.com
guardian.api.show-fields=headline,thumbnail,trailText,bodyText,byline

